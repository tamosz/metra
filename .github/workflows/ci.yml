name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  review:
    if: github.event_name == 'pull_request'
    runs-on: arc-ci
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-opus-4-6
            --allowedTools "Read,Grep,Glob,mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*)"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this PR. Focus on bugs, logic errors, and security issues. Be concise.
            Use `gh pr comment` for top-level feedback.
            Use `mcp__github_inline_comment__create_inline_comment` (with `confirmed: true`) to highlight specific code issues.
            Only post GitHub comments - don't submit review text as messages.

  check:
    runs-on: ${{ github.event_name == 'pull_request' && 'arc-ci' || 'ubuntu-latest' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - run: npm ci
      - run: cd web && npm ci

      - name: Engine lint
        run: npm run lint

      - name: Web lint
        run: npm run lint:web

      - name: Engine type-check
        run: npm run type-check

      - name: Web type-check
        run: npm run type-check:web

      - name: Engine tests
        run: npm test

      - name: Web tests
        run: cd web && npm test

      - name: Data validation
        run: npm run validate-data

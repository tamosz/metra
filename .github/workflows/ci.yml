name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - run: npm ci
      - run: cd web && npm ci

      - name: Engine tests
        run: npm test

      - name: Engine type-check
        run: npm run type-check

      - name: Web tests
        run: cd web && npm test

      - name: Web type-check
        run: npm run type-check:web

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            web/package-lock.json

      - run: npm ci
      - run: cd web && npm ci

      - name: Engine lint
        run: npm run lint

      - name: Web lint
        run: npm run lint:web

      - name: Engine type-check
        run: npm run type-check

      - name: Web type-check
        run: npm run type-check:web

      - name: Engine tests
        run: npm test

      - name: Web tests
        run: cd web && npm test

      - name: Data validation
        run: npm run validate-data
